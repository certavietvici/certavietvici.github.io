<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certavi et Vici — Aachen LLC</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap');

:root { --accent: #b38b2e; }

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Inter', sans-serif;
    background: #050505;
    color: #e0e0e0;
    display: flex;
}

/* ✅ Better layout balance */
#map-container {
    position: sticky;
    top: 0;
    width: 35%;
    height: 100vh;
    border-right: 1px solid #222;
}

#map { width: 100%; height: 100%; }

#content {
    width: 65%;
    padding: 0 8%;
}

.section {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    opacity: 0.3;
    transition: opacity 0.5s ease;
}

.section.active { opacity: 1; }

.logo {
    font-family: 'Playfair Display', serif;
    font-size: 3rem;
    color: #fff;
    margin-bottom: 1rem;
}

.tagline {
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 2rem;
}

h2 { color: #fff; margin-bottom: 0.5rem; }
p { color: #aaa; }

/* Tooltip styling */
.leaflet-tooltip {
    background: rgba(0,0,0,0.85) !important;
    color: #fff !important;
    border: 1px solid #444 !important;
    font-family: monospace;
}

.leaflet-marker-icon {
    filter: brightness(0) invert(1);
}

@media (max-width: 900px) {
    body { flex-direction: column; }
    #map-container, #content { width: 100%; }
    #map-container { height: 40vh; }
}
</style>
</head>

<body>

<div id="map-container"><div id="map"></div></div>

<div id="content">
    <!-- ✅ Hero has NO coordinates -->
    <div class="section active">
        <h1 class="logo">Certavi et Vici</h1>
        <p class="tagline">Cybersecurity Solutions</p>
        <p>Scroll to explore the journey.</p>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
/* =========================================================
   ✅ YOUR DATA GOES HERE (replace with resume later)
   ========================================================= */

const locations = [
    {
        year: "1999",
        title: "Harvard Kennedy School",
        lat: 42.3718,
        lng: -71.1213,
        zoom: 15,
        description: "Cambridge, MA"
    },
    {
        year: "1999-2000",
        title: "McMahon Lab",
        lat: 42.3789,
        lng: -71.1154,
        zoom: 16,
        description: "Harvard University"
    },
    {
        year: "2000-2001",
        title: "Boston Transition",
        lat: 42.3601,
        lng: -71.0589,
        zoom: 13,
        description: "Multiple organizations"
    },
    {
        year: "2001",
        title: "Capitol Hill",
        lat: 38.8998,
        lng: -77.0061,
        zoom: 15,
        description: "Washington DC"
    },
    {
        year: "2001-2003",
        title: "NASA HQ",
        lat: 38.8831,
        lng: -77.0163,
        zoom: 16,
        description: "Code FT"
    },
    {
        year: "2004-2005",
        title: "Wolf Trap Foundation for the Performing Arts",
        lat:  38.9385,
        lng: -77.2648,
        zoom: 15,
        description: "Vienna, VA"
    },
    {
        year: "2005-2006",
        title: "Dataprise, Inc",
        lat:  39.1023,
        lng: -77.2023,
        zoom: 15,
        description: "Rockville, MD"
    },
];

/* =========================================================
   BUILD CONTENT FROM DATA
   ========================================================= */

const content = document.getElementById('content');

locations.forEach(loc => {
    const div = document.createElement('div');
    div.className = 'section';
    div.dataset.lat = loc.lat;
    div.dataset.lng = loc.lng;
    div.dataset.zoom = loc.zoom;
    div.dataset.place = loc.title;

    div.innerHTML = `
        <h2>${loc.year}</h2>
        <p><strong>${loc.title}</strong><br>${loc.description}</p>
    `;

    content.appendChild(div);
});

/* =========================================================
   MAP INIT (auto-fit to real data)
   ========================================================= */

const coords = locations.map(l => [l.lat, l.lng]);

const map = L.map('map', {
    zoomControl: false,
    attributionControl: false
});

const bounds = L.latLngBounds(coords);
map.fitBounds(bounds, { padding: [50, 50] });

/* Dark map */
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    subdomains: 'abcd',
    maxZoom: 20
}).addTo(map);

/* Path */
L.polyline(coords, {
    color: '#ffffff',
    weight: 2,
    opacity: 0.8
}).addTo(map);

/* Scroll behavior */
const sections = document.querySelectorAll('.section');
let marker;

const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
        if (entry.isIntersecting && entry.target.dataset.lat) {

            sections.forEach(s => s.classList.remove('active'));
            entry.target.classList.add('active');

            const lat = parseFloat(entry.target.dataset.lat);
            const lng = parseFloat(entry.target.dataset.lng);
            const zoom = parseInt(entry.target.dataset.zoom);
            const place = entry.target.dataset.place;

            map.flyTo([lat, lng], zoom, { duration: 2 });

            if (marker) map.removeLayer(marker);

            marker = L.marker([lat, lng]).addTo(map)
                .bindTooltip(place, { permanent: true, direction: 'top' })
                .openTooltip();
        }
    });
}, { threshold: 0.6 });

sections.forEach(section => observer.observe(section));

</script>

</body>
</html>
