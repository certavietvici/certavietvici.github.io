<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certavi et Vici — Aachen LLC</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap');

:root { --accent: #b38b2e; }

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Inter', sans-serif;
    background: #050505;
    color: #e0e0e0;
    display: flex;
}

#map-container {
    position: sticky;
    top: 0;
    width: 35%;
    height: 100vh;
    border-right: 1px solid #222;
}

#map { width: 100%; height: 100%; }

#content {
    width: 65%;
    padding: 0 8%;
}

.section {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    opacity: 0.3;
    transition: opacity 0.5s ease;
}

.section.active { opacity: 1; }

.logo {
    font-family: 'Playfair Display', serif;
    font-size: 3rem;
    color: #fff;
    margin-bottom: 1rem;
}

.tagline {
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 2rem;
}

h2 { color: #fff; margin-bottom: 0.5rem; }
p { color: #aaa; }

/* Tooltip */
.leaflet-tooltip {
    background: rgba(0,0,0,0.85) !important;
    color: #fff !important;
    border: 1px solid #444 !important;
    font-family: monospace;
}

/* ✅ SMALL DOT MARKERS (replaces big pins) */
.custom-dot {
    background: transparent;
    border: none;
}

.custom-dot div {
    width: 8px;
    height: 8px;
    background: #ffffff;
    border-radius: 50%;
    box-shadow: 0 0 6px rgba(255,255,255,0.6);
}

/* optional subtle hover scale */
.custom-dot:hover div {
    transform: scale(1.4);
}

@media (max-width: 900px) {
    body { flex-direction: column; }
    #map-container, #content { width: 100%; }
    #map-container { height: 40vh; }
}
</style>
</head>

<body>

<div id="map-container"><div id="map"></div></div>

<div id="content">
    <div class="section active">
        <h1 class="logo">Certavi et Vici</h1>
        <p class="tagline">Cybersecurity Solutions</p>
        <p>Scroll to explore the journey.</p>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

/* =========================================================
   ROLE DATA
   ========================================================= */

const roles = [
    {
        year: "1999",
        title: "Harvard Kennedy School",
        locations: [
            { lat: 42.3718, lng: -71.1213, label: "Cambridge, MA" }
        ]
    },
    {
        year: "2001-2003",
        title: "NASA HQ",
        locations: [
            { lat: 38.8831, lng: -77.0163, label: "Washington, DC" }
        ]
    },
    {
        year: "2011",
        title: "ITT (Deployment)",
        locations: [
            { lat: 32.3617, lng: -84.9493, label: "Ft. Benning, GA" },
            { lat: 29.3759, lng: 47.9774, label: "Kuwait" },
            { lat: 34.9462, lng: 69.2646, label: "Bagram, Afghanistan" },
            { lat: 33.5560, lng: 68.4200, label: "Ghazni, Afghanistan" }
        ]
    }
];

/* =========================================================
   BUILD CONTENT
   ========================================================= */

const content = document.getElementById('content');

roles.forEach(role => {
    const div = document.createElement('div');
    div.className = 'section';
    div.dataset.role = role.title;

    div.innerHTML = `
        <h2>${role.year}</h2>
        <p><strong>${role.title}</strong></p>
    `;

    content.appendChild(div);
});

/* =========================================================
   MAP INIT
   ========================================================= */

const map = L.map('map', {
    zoomControl: false,
    attributionControl: false
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    subdomains: 'abcd',
    maxZoom: 20
}).addTo(map);

/* start */
const first = roles[0].locations[0];
map.setView([first.lat, first.lng], 6);

/* =========================================================
   ARC FUNCTION
   ========================================================= */

function createArc(start, end) {
    const points = [];
    const offset = 10;

    for (let t = 0; t <= 1; t += 0.05) {
        const lat = (1 - t) * start[0] + t * end[0] + offset * Math.sin(Math.PI * t);
        const lng = (1 - t) * start[1] + t * end[1];
        points.push([lat, lng]);
    }

    return points;
}

/* =========================================================
   SCROLL LOGIC
   ========================================================= */

const sections = document.querySelectorAll('.section');
let markers = [];
let lines = [];

const smallDot = L.divIcon({
    className: 'custom-dot',
    html: '<div></div>',
    iconSize: [8, 8]
});

const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
        if (!entry.isIntersecting) return;

        sections.forEach(s => s.classList.remove('active'));
        entry.target.classList.add('active');

        const role = roles.find(r => r.title === entry.target.dataset.role);
        if (!role) return;

        markers.forEach(m => map.removeLayer(m));
        lines.forEach(l => map.removeLayer(l));
        markers = [];
        lines = [];

        const coords = role.locations.map(l => [l.lat, l.lng]);

        if (coords.length > 1) {
            const bounds = L.latLngBounds(coords);
            map.fitBounds(bounds, { padding: [80, 80], maxZoom: 7 });
        } else {
            map.flyTo(coords[0], 10, { duration: 2 });
        }

        role.locations.forEach((loc, i) => {
            const m = L.marker([loc.lat, loc.lng], { icon: smallDot }).addTo(map);

            // FIX: no permanent labels → prevents overlap
            m.bindTooltip(loc.label, { direction: 'top' });

            markers.push(m);
        });

        for (let i = 0; i < coords.length - 1; i++) {
            const arc = createArc(coords[i], coords[i + 1]);

            const line = L.polyline(arc, {
                color: '#555',
                weight: 1.5,
                opacity: 0.4,
                dashArray: '4,6'
            }).addTo(map);

            lines.push(line);
        }
    });
}, { threshold: 0.6 });

sections.forEach(section => observer.observe(section));

</script>

</body>
</html>
