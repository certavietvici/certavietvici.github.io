<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certavi et Vici — Aachen LLC</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap');
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap');

:root {
    --hud: #00ff66;
    --bg: #050505;
}

* { margin:0; padding:0; box-sizing:border-box; }

html, body {
    height: 100%;
    background: var(--bg);
    color: #e0e0e0;
    font-family: 'Inter', sans-serif;
    overflow-y: auto;
}

/* =========================
   LAYOUT
========================= */
#content {
    width: 100%;
    padding: 0 10%;
    padding-bottom: 55vh;
}

.section {
    min-height: 100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    opacity:0.3;
    transition: opacity 0.4s ease;
}

.section.active { opacity:1; }

.logo {
    font-family:'Playfair Display', serif;
    font-size:3rem;
    color:#fff;
    margin-bottom:1rem;
}

.tagline {
    color: var(--hud);
    font-weight:600;
    margin-bottom:2rem;
}

/* =========================
   STATIC MAP FRAME (BOTTOM HUD)
========================= */
#map-container {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 20vh; /* reduced size as requested */
    border-top: 1px solid #222;
    background: #000;
    overflow: hidden;
}

#map-frame {
    width: 100%;
    height: 100%;
    position: relative;
}

/* smooth fade between images */
.map-image {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 0.6s ease;
    filter: grayscale(1) contrast(1.2) brightness(0.6);
}

.map-image.active {
    opacity: 1;
}

/* HUD overlay */
#hud-label {
    position:absolute;
    top:8px;
    left:12px;
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    color: var(--hud);
    background: rgba(0,0,0,0.7);
    padding:4px 8px;
    border:1px solid var(--hud);
}
</style>
</head>

<body>

<div id="content">

    <div class="section active" data-map="front_royal">
        <h1 class="logo">Certavi et Vici</h1>
        <p class="tagline">Cybersecurity Operations</p>
        <p>Scroll to navigate operational history.</p>
    </div>

    <div class="section" data-map="harvard">
        <h2>1999</h2>
        <p>Harvard Kennedy School — Cambridge, MA</p>
    </div>

    <div class="section" data-map="nasa">
        <h2>2001–2003</h2>
        <p>NASA HQ — Washington, DC</p>
    </div>

    <div class="section" data-map="itt">
        <h2>2011 Deployment</h2>
        <p>Ft Benning → Kuwait → Bagram → Ghazni</p>
    </div>

</div>

<!-- STATIC MAP FRAME -->
<div id="map-container">
    <div id="hud-label">MAP DISPLAY // STATIC SNAPSHOT MODE</div>
    <div id="map-frame">

        <!-- Front Royal (default / anchor) -->
        <img class="map-image active" id="front_royal"
             src="https://staticmap.openstreetmap.de/staticmap.php?center=38.9180,-78.1947&zoom=7&size=1200x300&markers=38.9180,-78.1947,green">

        <!-- Harvard -->
        <img class="map-image" id="harvard"
             src="https://staticmap.openstreetmap.de/staticmap.php?center=42.3732,-71.1167&zoom=11&size=1200x300&markers=42.3732,-71.1167,green">

        <!-- NASA -->
        <img class="map-image" id="nasa"
             src="https://staticmap.openstreetmap.de/staticmap.php?center=38.8831,-77.0163&zoom=10&size=1200x300&markers=38.8831,-77.0163,green">

        <!-- ITT multi-node composite center -->
        <img class="map-image" id="itt"
             src="https://staticmap.openstreetmap.de/staticmap.php?center=33.5,55&zoom=3&size=1200x300&markers=32.3617,-84.9493,green|29.3759,47.9774,green|34.9462,69.2646,green|33.5560,68.4200,green">

    </div>
</div>

<script>
const sections = document.querySelectorAll('.section');

const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
        if (!entry.isIntersecting) return;

        sections.forEach(s => s.classList.remove('active'));
        entry.target.classList.add('active');

        const mapId = entry.target.dataset.map;
        if (!mapId) return;

        document.querySelectorAll('.map-image').forEach(img => {
            img.classList.remove('active');
        });

        const active = document.getElementById(mapId);
        if (active) active.classList.add('active');
    });
}, { threshold: 0.6 });

sections.forEach(s => observer.observe(s));
</script>

</body>
</html>
